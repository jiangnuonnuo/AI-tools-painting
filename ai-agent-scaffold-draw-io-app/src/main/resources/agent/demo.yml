                - local:
                    name: myToolCallbackProvider
              # 可以配置 skills 技能书，放到 resource 提供
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              - name: agentDemo01
                description: 智能体描述
                instruction: |
                  智能体描述指令
                output-key: ev_technology_result
              - name: agentDemo02
                description: 智能体描述
                instruction: |
                  智能体描述指令。可以引入上一个智能体内容，{ev_technology_result}
                output-key: ev_technology_result
            agent-workflows:
              - type: loop
                name: 工作流智能体，循环
                description: 这个
                max-iterations: 最大循环步骤
                sub-agents:
                  - 可以配置 agents 下的智能体
                  - 可以配置 agents 下的智能体
              - type: parallel
                name: 工作流智能体，并行
                description: 并行执行一些内容
                sub-agents:
                  - 可以配置 agents 下的智能体
                  - 可以配置 agents 下的智能体
              - type: sequential
                name: 工作流智能体，串行
                description: 串行执行一些内容
                sub-agents:
                  - 可以配置 agents 下的智能体，也可以配置，agent-workflows下的 loop 或者 parallel 智能体的名称。
                  - 可以配置 agents 下的智能体
            runner:
              agent-name: 指定运行的智能体入口，可以是 agents 下的单个智能体名称，也可以是 agent-workflows 配置的工作流智能体名称
