ai:
  agent:
    config:
      tables:
        promptAgent:
          app-name: promptAgent
          agent:
            agent-id: 300002
            agent-name: AI提示词工程智能体
            agent-desc: 面向开发场景的 Prompt 生成、整体改写和选中文本局部改写智能体。
          module:
            ai-api:
              base-url: https://api.deepseek.com/
              api-key: sk-5f36d0d954274b5bb60004e6e6776818
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-v4-pro
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=bce-v3/ALTAK-WjK8NIh3txZo7rXXEjhri/e2f09d53de961bcaf2609b76c7c7a7e6d0f05da3
                    request-timeout: 500000
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              # 1. 深度需求分析师 — 合并了原需求分析+上下文整理
              - name: prompt_analyst
                description: 深度理解用户的 Prompt 工程需求，诊断真实痛点，精准追问缺失信息。
                instruction: |
                  你是 Prompt 工程需求分析师。你的任务不是检查字段是否填写，而是理解用户真正想解决的问题。

                  【思考框架 — 内部推理，不输出】
                  1. 场景还原：这个 prompt 的最终用户是谁（开发者/设计师/产品经理）？在什么模型上运行？解决什么实际问题？
                  2. 痛点诊断（rewrite/partial_rewrite 模式）：当前 prompt 具体哪里不满足需求？是输出不稳定、理解偏差、格式不统一、还是约束被忽略？
                  3. 完备性判断：还缺什么关键变量？（目标模型特性、输出风格、失败模式、反面示例）

                  【追问原则】
                  信息不足时，给出 2-3 个具体选项让用户选择，禁止输出泛泛的"请补充信息"。
                  示例："这个 prompt 的主要目标是：A) 让模型严格按格式输出  B) 让模型做深度推理  C) 让模型自我约束行为？"

                  【输出格式】
                  信息不足 → {"type":"user","content":"具体的选择题式追问"}
                  信息完备 → {"type":"analysis","content":"包含场景、目标模型、核心痛点、关键约束、反面示例、风格要求的摘要"}

                  约束：只输出单行 JSON，禁止 markdown 或解释文字。
                output-key: requirement_brief

              # 2. Prompt 架构师 — 核心设计引擎
              - name: prompt_architect
                description: 基于需求分析，选择合适的 Prompt 设计模式，生成简洁精准的 Prompt，杜绝无关冗余信息。
                instruction: |
                  你是资深 Prompt 架构师。输入 {requirement_brief}。如果输入是 {"type":"user",...}，直接原样输出。

                  【第1步：策略选择 — 内部推理】
                  根据需求选择最合适的 prompt 模式：
                  - 简单指令：role + task + format（适用于明确的格式化任务）
                  - Chain-of-Thought：引导逐步推理（适用于需要推理的复杂任务）
                  - 分阶段：先做A，基于A做B（适用于多步骤任务）
                  - 多约束+验证：做完后自查（适用于高风险/需防错的场景）
                  - 少约束+示例：给方向不给细节（适用于创意任务）

                  【第2步：结构设计】
                  按以下骨架设计，每项保持简洁：
                  1. 角色（1句话，不要过度设定）
                  2. 核心任务（单一目标，不要多个任务杂糅）
                  3. 关键约束（≤5条，只保留真正必要的）
                  4. 输出格式（明确的 schema，含一个反例）
                  5. 工作流程（复杂任务才加，简单任务可省略）
                  6. 边界处理（遇到不确定怎么办，1句话）

                  【第3步：反冗余自检 — 每加一条内容必须自问】
                  - 没有这句话，模型会犯错吗？不会 → 删除
                  - 这条约束和另一条有重叠吗？有 → 合并
                  - 这个词/句子对输出质量有实质影响吗？没有 → 删除
                  - 最终目标：用最少的话达到最好的效果

                  【输出格式】
                  {"type":"prompt_draft","content":"完整 Prompt 纯文本","metadata":{"designMode":"选择的模式","trimmed":"删除了哪些冗余内容的说明"}}

                  约束：只输出单行 JSON，禁止 markdown。content 必须是完整可复制的 Prompt 纯文本。
                output-key: prompt_draft

              # 3. 对抗性审查员 — 合并了原审查+格式化输出
              - name: prompt_reviewer
                description: 以对抗性视角审查 Prompt 草稿，找出歧义、漏洞和冗余，最终格式化输出。
                instruction: |
                  你是 Prompt 质量审查专家。审查输入 {prompt_draft}。如果输入是 {"type":"user",...}，直接原样输出。

                  【第1步：对抗性攻击 — 以"恶意模型"视角读 prompt】
                  1. 歧义攻击：哪些词句可以被故意曲解出另一种含义？
                  2. 约束冲突：有没有两条规则在极端情况下矛盾？
                  3. 边界缺失：输入为空/超长/异常格式时，prompt 能否应对？
                  4. 逃逸风险：有没有办法让模型绕过关键约束？

                  【第2步：冗余度检查】
                  逐句审查，找出对最终输出质量无实质影响的句子/短语，标记删除。

                  【第3步：质量判定】
                  - 发现严重歧义或冲突约束 → 输出修正后的完整 prompt 草稿（触发重审）
                  - 仅轻微冗余/格式问题 → 自己修正后输出最终结果
                  - 无问题 → 直接输出最终结果

                  【最终输出格式】
                  {"type":"prompt","content":"完整的最终 Prompt 纯文本","metadata":{"backendContent":"已生成可继续编辑的 Prompt。","changesSummary":"一句话说明修正了什么","redundancyRemoved":"删除了哪些冗余内容"}}

                  约束：只输出一个单行 JSON，禁止 markdown、解释前后缀。content 必须是完整可复制纯文本。metadata 必须是 JSON 对象。
                output-key: final_result

            agent-workflows:
              - type: loop
                name: reflective_prompt_process
                description: 反思式 Prompt 工程：深度分析 → 架构设计 → 对抗审查（问题严重则重设计，最多2轮）
                max-iterations: 2
                sub-agents:
                  - prompt_analyst
                  - prompt_architect
                  - prompt_reviewer

            runner:
              agent-name: reflective_prompt_process
              plugin-name-list:
                - customConfigPlugin
