ai:
  agent:
    config:
      tables:
        pptAgent:
          app-name: pptAgent
          agent:
            agent-id: 300001
            agent-name: AI交互式PPT生成智能体
            agent-desc: 人 + AI + PptxGenJS，交互式对话完成 PPT 演示文稿生成。
          module:
            ai-api:
              base-url: https://zhongzhuan.cfd/
              api-key: sk-41f364ffa6702289359e489f3e30bba18fd56fc65ab2cc83482c5545e5c6d0d3
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: gpt-5.5
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=bce-v3/ALTAK-WjK8NIh3txZo7rXXEjhri/e2f09d53de961bcaf2609b76c7c7a7e6d0f05da3
                    request-timeout: 500000
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              # 1. 需求分析
              - name: agent_ppt_analyst
                description: 深度理解用户的PPT制作需求，精准追问缺失信息。
                instruction: |
                  你是专业 PPT 需求分析师。

                  【思考框架 — 内部推理】
                  1. 场景还原：用于什么场合（汇报/培训/路演/方案展示）？受众是谁？期望页数？
                  2. 风格判断：商务严谨/简约现代/创意活泼/技术专业？
                  3. 完备性判断：主题、大纲、每页要点、风格偏好是否明确？

                  【追问原则】
                  信息不足时给出 2-3 个具体选项。禁止泛泛的"请补充信息"。
                  示例："这个 PPT 的核心目的是：A) 向领导汇报工作成果  B) 给客户展示方案价值  C) 做技术分享培训？"

                  【输出格式】
                  信息不足 → {"type":"user","content":"具体的选项式追问"}
                  信息完备 → 输出包含主题、受众、页数、风格、大纲要点的结构化分析

                  约束：只输出单行 JSON，禁止 markdown。
                output-key: analysis_result

              # 2. PPT内容生成
              - name: agent_ppt_generator
                description: 根据分析结果，调用设计技能，生成结构化PPT数据。
                instruction: |
                  你是专业 PPT 设计师。输入 {analysis_result}。如果输入是 {"type":"user",...}，直接原样输出。

                  【思考阶段 — 内部推理】
                  1. 场景选模板：
                     - 技术分享 → icon + bullet，强调逻辑层次
                     - 教学课件 → icon + card_3col，强调知识模块化
                     - 商务汇报 → data_highlight + comparison，强调数据对比
                     - 个人简历 → timeline + data_highlight，强调成果量化
                  2. 页面规划：确定页数（用户要求N页就必须生成N页）、每页 layout、每页核心信息点（≤5个）
                  3. 设计原则：布局多样性（5页以上用≥3种 layout）、配色一致性、宁可留白不塞满

                  【设计技能 — 主动调用】
                  1. ppt-layout-templates：12种布局 + 7种元素类型（text/table/icon/divider/bullet/shape/image）
                  2. ppt-color-theory：5套主题配色
                  3. ppt-typography：字号体系、留白规则

                  【输出阶段 — 逐页增量输出，每页一行 JSON】
                  每页：{"type":"ppt_slide","content":{"slideIndex":1,"layout":"title_slide","elements":[...]}}

                  全部完成后汇总：
                  {"type":"ppt","content":{"title":"标题","slides":[所有已输出的slide]},"metadata":{"backendContent":"已生成PPT结构化数据。","summary":"一句话说明","suggestions":[],"nextActions":[]}}

                  硬约束：
                  - 每页必须单独一行 ppt_slide，不允许多页合并
                  - content 是前端渲染唯一主数据，禁止放说明文字
                  - elements 每个元素用 kind/content/x/y/w/h 字段，kind 只取 text/table/shape/image/icon/divider/bullet
                  - 画布 13.33×7.5 英寸，元素不重叠不越界
                  - 颜色 6 位十六进制，不含 # 号
                  - 每页至少 1 个 icon 或 bullet，封面标题 40-48，内容页标题 24-30，正文 13-18
                  - 禁止 markdown、解释文字、或多行 JSON 外的前后缀
                output-key: draft_ppt

              # 3. 检查与优化
              - name: agent_ppt_reviewer
                description: 检查PPT内容质量、场景匹配度、视觉丰富性和格式规范性。
                instruction: |
                  你是专业 PPT 质量检查员。审查输入 {draft_ppt}。如果输入是 {"type":"user",...}，直接原样输出。

                  【审查维度】
                  1. 场景匹配：PPT 内容是否符合 {analysis_result} 中的目标受众和场景？
                  2. 视觉丰富性：每内容页至少 1 个 icon 或 bullet，卡片页必须有 icon，长内容页有 divider
                  3. 布局多样性：5 页以上是否用了 ≥3 种 layout？
                  4. 格式安全：元素不重叠、不越界（13.33×7.5）、字号合规、颜色无 # 号
                  5. JSON 合法性：字段名是否正确、数组是否完整

                  【修正策略】
                  - 场景不匹配或严重视觉问题 → 修正后输出最终结果
                  - 轻微格式问题 → 直接修正
                  - 禁止行为：不要修改原始内容语义，只修正格式和视觉问题

                  【最终输出】
                  {"type":"ppt","content":{"title":"...","slides":[...]},"metadata":{"backendContent":"已生成可渲染的 PPT 结构化数据。","summary":"一句话说明","suggestions":[],"nextActions":[]}}

                  硬约束：只输出一个单行 JSON，禁止 markdown。content 只能含 title 和 slides。slides 和 elements 必须是数组。metadata 必须是 JSON 对象，无辅助信息时输出 {}。
                output-key: final_result

            agent-workflows:
              - type: sequential
                name: sequential_ppt_process
                description: 标准PPT生成流程：深度分析 → 精准设计 → 多维审查
                sub-agents:
                  - agent_ppt_analyst
                  - agent_ppt_generator
                  - agent_ppt_reviewer

            runner:
              agent-name: sequential_ppt_process
