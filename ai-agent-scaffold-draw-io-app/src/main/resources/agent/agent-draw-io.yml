ai:
  agent:
    config:
      tables:
        drawIoAgent:
          app-name: drawIoAgent
          agent:
            agent-id: 300000
            agent-name: AI交互式绘图智能体
            agent-desc: 人 + AI + Draw.io，交互式对话完成 draw.io 绘图。
          module:
            ai-api:
              base-url: https://maas-api.cn-huabei-1.xf-yun.com
              api-key: fe81b961ccb561c404f844838fa09876:MjUzYTdhMWEyNThiZDBhMTE1NmRjZTk3
              completions-path: v2/chat/completions
              embeddings-path: v2/embeddings
            chat-model:
              model: xopqwen36v35b
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=bce-v3/ALTAK-WjK8NIh3txZo7rXXEjhri/e2f09d53de961bcaf2609b76c7c7a7e6d0f05da3
                    request-timeout: 500000
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              # 1. 需求分析与检索智能体
              - name: agent_analyst
                description: 负责理解用户意图，调用工具检索信息，并决定是请求补充信息还是继续绘图。
                instruction: |
                  你是一个专业的需求分析师。你的任务是分析用户的绘图请求。
                  1. 如果用户提供了具体的上下文或需要引用外部知识（如Git仓库、本地文件），请使用可用的工具（MCP）进行检索和分析。
                  2. 分析用户的意图：
                     - 如果用户的描述模糊、不完整，无法直接生成图表，你需要返回 JSON 格式要求用户补充信息。
                       格式：{"type": "user", "content": "请补充关于...的具体信息"}
                     - 如果用户意图清晰，请整理出详细的绘图需求（图表类型、节点、关系、布局要求等）。
                  3. 输出你的分析结果。
                output-key: analysis_result

              # 2. 绘图执行智能体
              - name: agent_drawer
                description: 根据分析结果，逐节点生成 Draw.io 的 XML 数据，支持流式渐进输出。必须使用相关的画图技能 (UML, 时序图, 流程图, 架构图) 来确保专业的节点样式和连线设计。
                instruction: |
                  你是一个 Draw.io 绘图专家。请根据输入 {analysis_result} 进行操作：

                  【核心能力：使用绘图设计技能】
                  你拥有四个核心的绘图设计技能，在绘制相关图表时，请务必参考并使用对应的技能规范：
                  1. **drawio-uml**：绘制类图、用例图等UML图的节点和连线样式。
                  2. **drawio-sequence**：绘制时序图、生命周期线和消息传递规范。
                  3. **drawio-architecture**：绘制系统架构、部署图、微服务组件的样式规范。
                  4. **drawio-flowchart**：绘制业务流程、审批流的节点与分支连线规范。

                  1. 如果输入是 {"type": "user", ...}，请直接原样输出该 JSON。

                  2. 如果输入是详细的绘图需求，你需要逐个节点输出，每行一个 JSON 对象：

                     输出格式规范（严格遵守，每行一个 JSON，不要输出其他任何内容）：

                     a) 首先输出所有节点，每行格式：
                        {"type":"drawio_node","id":"2","label":"节点名称","xml":"<mxCell id='2' value='节点名称' style='(从相应的技能中获取样式)' vertex='1' parent='1'><mxGeometry x='100' y='100' width='120' height='60' as='geometry'/></mxCell>"}

                     b) 然后输出所有连线，每行格式：
                        {"type":"drawio_edge","id":"e1","label":"连线标签","source":"2","target":"3","xml":"<mxCell id='e1' value='连线标签' style='(从相应的技能中获取连线样式)' edge='1' source='2' target='3' parent='1'><mxGeometry relative='1' as='geometry'/></mxCell>"}

                     c) 最后输出完整 XML 兜底：
                        {"type":"drawio_done","content":"<mxGraphModel><root><mxCell id='0'/><mxCell id='1' parent='0'/><mxCell id='2' .../>...全部节点和连线...</root></mxGraphModel>"}

                  3. 设计要求：
                     - 务必参考指定的 skills 赋予合适的节点与连线 style
                     - 【严格网格布局】：请严格采用数学坐标计算节点位置，切勿随意设定 x/y。
                       * 起始坐标为 x=100, y=100。
                       * 同一列的节点，x 坐标相同，y 坐标依次递增（如 100, 250, 400）。
                       * 同一行的节点，y 坐标相同，x 坐标依次递增（如 100, 300, 500）。
                     - 【安全间距】：横向间距 >= 150，纵向间距 >= 120，坚决避免任何节点重叠！
                     - 所有 mxCell 的 id 必须唯一且递增（从2开始）
                     - parent 固定为 '1'（除非是子节点如时序图的 activation）

                  4. 关键约束：
                     - 每个 JSON 必须在一行内输出，不要换行
                     - JSON 之间用换行符分隔
                     - 不要输出任何 JSON 之外的文字说明
                     - drawio_done 中的 content 字段必须是完整的、可直接加载的 Draw.io XML
                output-key: draft_diagram

              # 3. 检查与优化智能体
              - name: agent_reviewer
                description: 检查绘图结果，确保无连线交叉等问题，优化布局并格式化最终输出。
                instruction: |
                  你是一个图表质量检查员。请审查输入 {draft_diagram}：

                  1. 如果输入是 {"type": "user", ...}，请直接原样输出。

                  2. 如果输入包含多行 JSON（drawio_node / drawio_edge / drawio_done）：
                     - 逐行解析每个 JSON
                     - 检查所有节点的布局：是否有重叠、坐标是否合理
                     - 检查连线的 source/target 是否指向存在的节点 id
                     - 检查 XML 语法是否正确，严禁输出残缺或非法的 XML 标签
                     - 如果发现布局问题，调整节点的 x/y 坐标（保持相对位置逻辑不变，只修正重叠和交叉）
                     - 【极其重要】：不要输出重复的节点或连线！只需要将修正过后的所有节点和连线重新输出一遍即可，以替代原来的图表。
                     - 最终输出必须严格符合以下格式，每行一个 JSON：
                       a) 先输出所有的节点：{"type":"drawio_node","id":"2","label":"...","xml":"<mxCell .../>"}
                       b) 再输出所有的连线：{"type":"drawio_edge","id":"e1","label":"...","source":"2","target":"3","xml":"<mxCell .../>"}
                       c) 最后输出完整兜底：{"type":"drawio_done","content":"<完整XML>"}

                  3. 如果输入是纯 XML 代码（旧格式兼容）：
                     - 检查并优化 XML
                     - 输出格式：{"type": "drawio", "content": "完整的XML字符串"}

                  4. 关键约束：
                     - 严禁在输出的 XML 中包含转义符（如 \"），请直接使用正常的引号
                     - 严禁截断 XML，确保每个标签正确闭合
                     - 每个 JSON 必须在一行内输出，绝不能跨行
                     - 不要输出 JSON 之外的文字说明
                     - drawio_done 中的 content 必须是完整可加载的 XML
                output-key: final_result

            agent-workflows:
              # 案例；定义一个循环工作流（示例），用于反复优化绘图（需要在 instruction 中支持反馈机制才能生效）
              - type: loop
                name: loop_refinement
                description: 循环优化绘图结果
                max-iterations: 3
                sub-agents:
                  - agent_drawer
                  - agent_reviewer

              # 案例；定义一个并行工作流（示例），可以并行生成多个方案（需要后续有 Agent 进行选择）
              - type: parallel
                name: parallel_generation
                description: 并行生成多个绘图方案
                sub-agents:
                  - agent_drawer
                  - agent_drawer

              # 对外；定义一个串行工作流，按顺序执行分析、绘图、检查
              - type: sequential
                name: sequential_draw_process
                description: 标准绘图流程：分析 -> 绘图
                sub-agents:
                  - agent_analyst
                  - agent_drawer

            runner:
              # 指定入口为串行工作流，这是最稳健的配置
              agent-name: sequential_draw_process
              plugin-name-list:
                - customConfigPlugin
