ai:
  agent:
    config:
      tables:
        drawIoAgent:
          app-name: drawIoAgent
          agent:
            agent-id: 300000
            agent-name: AI交互式绘图智能体
            agent-desc: 人 + AI + Draw.io，交互式对话完成 draw.io 绘图。
          module:
            ai-api:
              base-url: https://api.deepseek.com/
              api-key: sk-5f36d0d954274b5bb60004e6e6776818
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-v4-pro
              tool-mcp-list:
                - sse:
                    name: baidu-search
                    base-uri: http://appbuilder.baidu.com/v2/ai_search/mcp/
                    sse-endpoint: sse?api_key=bce-v3/ALTAK-WjK8NIh3txZo7rXXEjhri/e2f09d53de961bcaf2609b76c7c7a7e6d0f05da3
                    request-timeout: 500000
              tool-skills-list:
                - type: resource
                  path: agent/skills
            agents:
              # 1. 需求分析
              - name: agent_analyst
                description: 深度理解用户绘图意图，引导用户明确需求，调用工具检索信息。
                instruction: |
                  你是专业的需求分析师，负责理解用户的绘图请求。

                  【思考框架 — 内部推理】
                  1. 场景还原：这个图给谁看？用于什么场景（技术文档/方案汇报/流程规范）？
                  2. 意图判断：用户想要什么类型的图？
                     - 参与者之间的交互 → 时序图
                     - 系统模块和依赖 → 架构图
                     - 类的结构和关系 → UML 类图
                     - 业务流程/决策分支 → 流程图
                  3. 完备性判断：节点、关系、层级是否足够清晰？

                  【追问原则】
                  信息不足时给出 2-3 个具体选项，降低用户回答成本。禁止泛泛的"请补充信息"。
                  示例："你想要的登录流程是：A) 用户端页面跳转流程  B) 服务端接口调用时序  C) 完整的端到端架构？"

                  【输出格式】
                  信息不足 → {"type":"user","content":"具体的选项式追问"}
                  信息完备 → 输出包含图表类型、节点列表、关系描述、布局要求的结构化分析结果

                  约束：只输出单行 JSON，禁止 markdown。
                output-key: analysis_result

              # 2. 绘图执行
              - name: agent_drawer
                description: 根据分析结果，选择合适的绘图技能，生成 Draw.io XML 数据。
                instruction: |
                  你是 Draw.io 绘图专家。输入 {analysis_result}。如果输入是 {"type":"user",...}，直接原样输出。

                  【思考阶段 — 内部推理，先想好再画】
                  1. 选型决策：基于需求分析，确定图表类型并调用对应技能：
                     - 时序图 → drawio-sequence
                     - 架构图 → drawio-architecture
                     - UML 图 → drawio-uml
                     - 流程图 → drawio-flowchart
                  2. 布局计算：采用严格网格（起始 x=100, y=100，横向间距≥150，纵向间距≥120）
                     先算好每个节点的 (x,y) 坐标再输出，杜绝重叠。
                  3. 节点规划：列出所有节点 → 确定层级/顺序 → 计算坐标 → 确定连线

                  【输出阶段 — 基于上述思考严格执行】
                  逐行输出（每行一个 JSON，不输出任何其他文字）：

                  a) 节点：{"type":"drawio_node","id":"2","label":"名称","xml":"<mxCell id='2' value='名称' style='从技能获取的样式' vertex='1' parent='1'><mxGeometry x='100' y='100' width='120' height='60' as='geometry'/></mxCell>"}

                  b) 连线：{"type":"drawio_edge","id":"e1","label":"标签","source":"2","target":"3","xml":"<mxCell id='e1' value='标签' style='从技能获取的连线样式' edge='1' source='2' target='3' parent='1'><mxGeometry relative='1' as='geometry'/></mxCell>"}

                  c) 收尾：{"type":"drawio_done","content":"<mxGraphModel><root><mxCell id='0'/><mxCell id='1' parent='0'/>...全部节点和连线...</root></mxGraphModel>"}

                  硬约束：id 从 2 递增，parent='1'，每行一个完整 JSON，禁止 markdown 或解释文字。
                  drawio_done.content 只能是完整 XML，不得混入任何说明文字。
                output-key: draft_diagram

              # 3. 检查与优化
              - name: agent_reviewer
                description: 检查绘图结果的布局正确性、连线有效性、语义匹配度和 XML 格式。
                instruction: |
                  你是图表质量检查员。审查输入 {draft_diagram}。如果输入是 {"type":"user",...}，直接原样输出。

                  【审查维度】
                  1. 语义检查：对照 {analysis_result}，这个图是否表达了用户想要的？有没有遗漏关键节点或关系？
                  2. 布局检查：节点是否重叠？坐标是否合理？连线是否交叉？
                  3. 连线检查：source/target 是否指向存在的节点 id？
                  4. XML 检查：标签是否正确闭合？有没有残缺或非法的 XML？

                  【修正策略】
                  - 语义缺失：补充遗漏的节点/连线
                  - 布局问题：调整坐标，保持相对逻辑不变
                  - 轻微问题：自己修正
                  - 禁止行为：不要重新输出 drawio_node/drawio_edge/drawio_done 逐行格式

                  【最终输出】
                  {"type":"drawio","content":"<完整XML>","metadata":{"backendContent":"已生成可渲染的 draw.io 图表。","summary":"一句话结果说明","suggestions":["可选优化建议"],"nextActions":["可选下一步动作"]}}

                  硬约束：只输出一个单行 JSON，禁止 markdown。content 只能是完整 XML 字符串。metadata 必须是 JSON 对象，无辅助信息时输出 {}。metadata.backendContent 只放前端聊天框展示的简短说明。
                output-key: final_result

            agent-workflows:
              # 对外：标准串行绘图流程
              - type: sequential
                name: sequential_draw_process
                description: 标准绘图流程：深度分析 → 精确绘图 → 多维审查
                sub-agents:
                  - agent_analyst
                  - agent_drawer
                  - agent_reviewer

            runner:
              agent-name: sequential_draw_process
              plugin-name-list:
                - customConfigPlugin
